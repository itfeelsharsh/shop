    <!-- Programmatic orientation lock for PWA -->
    <script>
      (function() {
        function lockOrientation() {
          if (screen.orientation && screen.orientation.lock) {
            // Check if the app is in standalone mode (PWA)
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                               window.navigator.standalone || 
                               document.referrer.includes('android-app://');
            
            if (isStandalone) {
              screen.orientation.lock('portrait-primary').catch(function(error) {
                // Silently fail if the browser doesn't allow it yet
                // (e.g. requires a user gesture or full-screen)
                console.info("Orientation lock failed:", error);
              });
            }
          }
        }

        // Attempt to lock on load
        window.addEventListener('load', lockOrientation);
        
        // Also attempt on first user interaction as some browsers require it
        const lockOnInteraction = function() {
          lockOrientation();
          window.removeEventListener('click', lockOnInteraction);
          window.removeEventListener('touchstart', lockOnInteraction);
        };
        window.addEventListener('click', lockOnInteraction);
        window.addEventListener('touchstart', lockOnInteraction);

        // Reinforce lock when the page becomes visible again
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            lockOrientation();
          }
        });
      })();
    </script>
